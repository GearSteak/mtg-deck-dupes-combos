services:
  - type: web
    name: mtg-deck-dupes-combos
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: HOST
        value: "0.0.0.0"
